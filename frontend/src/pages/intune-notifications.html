<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InTune — Notifications</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117; --nav-bg: #0f1623; --card-bg: #131c2e; --card2: #1a2540;
    --green-node: #b8d96e; --blue-node: #5fc4b8; --you-color: #c93b6a;
    --text: #e8eaf0; --muted: #7a8599; --border: rgba(255,255,255,0.07);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:radial-gradient(ellipse at 85% 100%,rgba(95,196,184,0.11) 0%,rgba(13,17,23,0) 50%),var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; height:100vh; overflow:hidden; display:flex; flex-direction:column; }

  nav {
    background:var(--nav-bg); border-bottom:1.5px solid #1b3258;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 24px; height:56px; flex-shrink:0;
  }
  .nav-left { display:flex; align-items:center; gap:14px; }
  .nav-logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
  .nav-logo span { font-family:'Syne',sans-serif; font-weight:700; font-size:20px; font-style:italic; color:#AEC477; }
  .nav-divider { width:1px; height:20px; background:var(--border); }
  .nav-page { font-size:14px; color:var(--muted); }
  .nav-icons { display:flex; gap:10px; }
  .nav-icon {
    width:38px; height:38px; border-radius:50%; background:var(--card2);
    border:1px solid var(--border); display:flex; align-items:center; justify-content:center;
    cursor:pointer; position:relative; transition:background 0.2s; text-decoration:none;
  }
  .nav-icon:hover { background:rgba(184,217,110,0.1); }
  .nav-icon svg { width:17px; height:17px; fill:none; stroke:var(--muted); stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; }
  .badge {
    position:absolute; top:-2px; right:-2px; width:15px; height:15px; border-radius:50%;
    background:var(--you-color); font-size:8px; display:flex; align-items:center; justify-content:center;
    font-weight:700; color:#fff; border:1.5px solid var(--nav-bg);
  }

  .main { flex:1; display:flex; overflow:hidden; padding:16px; gap:14px; }

  /* Left: notification list */
  .notif-list {
    width:320px; flex-shrink:0;
    background:linear-gradient(to bottom,var(--card-bg),#1a2840); border-radius:14px;
    box-shadow:0 8px 40px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.3);
    display:flex; flex-direction:column; overflow:hidden;
  }
  .list-header {
    padding:16px 18px 12px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
  }
  .list-header-title { font-family:'Syne',sans-serif; font-weight:700; font-size:16px; }
  .mark-read { font-size:12px; color:var(--green-node); cursor:pointer; background:none; border:none; transition:opacity 0.2s; }
  .mark-read:hover { opacity:0.7; }

  .notif-scroll { overflow-y:auto; flex:1; padding:8px; }
  .notif-scroll::-webkit-scrollbar { width:3px; }
  .notif-scroll::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:3px; }

  .notif-item {
    display:flex; align-items:flex-start; gap:12px; padding:12px 10px;
    border-radius:10px; cursor:pointer; transition:background 0.15s;
    position:relative; margin-bottom:2px;
    animation: notifIn 0.35s cubic-bezier(0.22,1,0.36,1) both;
  }
  .notif-item:nth-child(1) { animation-delay:0.05s; }
  .notif-item:nth-child(2) { animation-delay:0.10s; }
  .notif-item:nth-child(3) { animation-delay:0.15s; }
  .notif-item:nth-child(4) { animation-delay:0.20s; }
  .notif-item:nth-child(5) { animation-delay:0.25s; }
  .notif-item:nth-child(n+6) { animation-delay:0.30s; }
  @keyframes notifIn { from { opacity:0; transform:translateX(-12px); } to { opacity:1; transform:translateX(0); } }

  .notif-item:hover { background:var(--card2); }
  .notif-item.active { background:rgba(201,59,106,0.08); border:1px solid rgba(201,59,106,0.15); }
  .notif-item.unread::after {
    content:''; position:absolute; top:14px; right:10px;
    width:7px; height:7px; border-radius:50%; background:var(--you-color);
  }

  .notif-avatar {
    width:40px; height:40px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:18px;
    background:linear-gradient(135deg, #1e2d4a, #2a1e3e);
    border:1.5px solid var(--border);
  }
  .notif-avatar.connect { background:linear-gradient(135deg, #1a3a1a, #0e2010); }
  .notif-avatar.song    { background:linear-gradient(135deg, #1a1a3a, #0e0e20); }
  .notif-avatar.match   { background:linear-gradient(135deg, #3a1a1a, #20100e); }

  .notif-body { flex:1; min-width:0; }
  .notif-text { font-size:12.5px; line-height:1.45; }
  .notif-text strong { font-weight:600; color:#fff; }
  .notif-text .notif-action { color:var(--green-node); font-weight:500; }
  .notif-time { font-size:11px; color:var(--muted); margin-top:3px; }

  /* Right: detail panel */
  .detail-panel {
    flex:1; background:linear-gradient(to bottom,var(--card-bg),#1a2840); border-radius:14px;
    box-shadow:0 8px 40px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.3);
    display:flex; flex-direction:column; overflow:hidden;
  }
  .detail-empty {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:12px; color:var(--muted);
  }
  .detail-empty svg { width:48px; height:48px; opacity:0.25; fill:none; stroke:var(--muted); stroke-width:1.2; stroke-linecap:round; stroke-linejoin:round; }
  .detail-empty p { font-size:14px; }

  .detail-content { flex:1; display:none; flex-direction:column; overflow:hidden; }
  .detail-content.show { display:flex; animation: detailIn 0.3s cubic-bezier(0.22,1,0.36,1) both; }
  @keyframes detailIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  .detail-header { padding:20px 24px 16px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .detail-type { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px; }
  .detail-title { font-family:'Syne',sans-serif; font-weight:700; font-size:22px; }
  .detail-time { font-size:12px; color:var(--muted); margin-top:4px; }

  .detail-body { padding:20px 24px; flex:1; overflow-y:auto; }
  .detail-body::-webkit-scrollbar { width:3px; }
  .detail-body::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:3px; }

  .detail-message { font-size:14px; line-height:1.7; color:rgba(232,234,240,0.85); margin-bottom:20px; }
  .detail-actions { display:flex; gap:10px; flex-wrap:wrap; }

  .action-btn {
    padding:9px 20px; border-radius:9px; font-family:'Syne',sans-serif;
    font-weight:600; font-size:13px; cursor:pointer; border:none; transition:all 0.18s;
  }
  .action-primary {
    background:linear-gradient(135deg, #c93b6a, #a02d54);
    color:#fff; box-shadow:0 3px 14px rgba(201,59,106,0.35);
  }
  .action-primary:hover { opacity:0.88; transform:translateY(-1px); }
  .action-secondary {
    background:var(--card2); color:var(--text);
    border:1px solid var(--border);
  }
  .action-secondary:hover { background:#243060; }

  /* Profile snippet in detail */
  .detail-profile {
    display:flex; align-items:center; gap:14px; padding:14px 16px;
    background:var(--card2); border-radius:12px; margin-bottom:16px;
    border:1px solid var(--border);
  }
  .dp-avatar {
    width:52px; height:52px; border-radius:50%;
    background:linear-gradient(135deg, #c93b6a44, #5fc4b844);
    border:2px solid rgba(201,59,106,0.3);
    display:flex; align-items:center; justify-content:center; font-size:24px;
  }
  .dp-name { font-family:'Syne',sans-serif; font-weight:700; font-size:16px; }
  .dp-sub { font-size:12px; color:var(--muted); margin-top:2px; }

  .shared-songs-wrap { margin-top:4px; }
  .shared-songs-title { font-family:'Syne',sans-serif; font-weight:700; font-size:13px; margin-bottom:8px; }
  .shared-songs-list { display:flex; flex-direction:column; gap:6px; }
  .shared-song {
    display:flex; align-items:center; gap:10px; padding:7px 10px;
    border-radius:8px; background:rgba(184,217,110,0.05);
    border:1px solid rgba(184,217,110,0.1); font-size:12px;
  }
  .shared-dot { width:6px; height:6px; border-radius:50%; background:var(--green-node); flex-shrink:0; }
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <a href="intune-dashboard.html" class="nav-logo">
      <svg width="26" height="34" viewBox="0 0 39 50" fill="none"><path d="M34.7139 23.8545L33.4558 30.9898C32.9261 33.994 31.0272 36.5839 28.3089 38.0097C24.2637 40.1315 19.2708 39.2512 16.1953 35.8737C14.1286 33.6042 13.23 30.5211 13.7598 27.5168L15.0179 20.3816M21.8056 39.4742L20.8084 45.1296M4.00067 25.2761L5.2586 18.1408C5.78824 15.1366 7.687 12.5467 10.4052 11.1208C14.4504 8.99878 19.4433 9.87902 22.519 13.2564C24.5857 15.5259 25.4844 18.609 24.9547 21.6132L23.6968 28.7485M16.9086 9.65607L17.9056 4.00067" stroke="#AEC477" stroke-width="8" stroke-linecap="round"/></svg>
      <span>InTune</span>
    </a>
    <div class="nav-divider"></div>
    <span class="nav-page">Notifications</span>
  </div>
  <div class="nav-icons">
    <a href="intune-profile.html" class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></a>
    <a href="intune-notifications.html" class="nav-icon" style="position:relative"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="badge" id="notifBadge">2</span></a>
    <a href="#" class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></a>
  </div>
</nav>

<div class="main">
  <!-- Left list -->
  <div class="notif-list">
    <div class="list-header">
      <span class="list-header-title">Notifications</span>
      <button class="mark-read" onclick="markAllRead()">Mark all read</button>
    </div>
    <div class="notif-scroll" id="notifScroll"></div>
  </div>

  <!-- Right detail -->
  <div class="detail-panel">
    <div class="detail-empty" id="detailEmpty">
      <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <p>Select a notification to view details</p>
    </div>
    <div class="detail-content" id="detailContent">
      <div class="detail-header">
        <div class="detail-type" id="detailType"></div>
        <div class="detail-title" id="detailTitle"></div>
        <div class="detail-time" id="detailTime"></div>
      </div>
      <div class="detail-body" id="detailBody"></div>
    </div>
  </div>
</div>

<script>
const NOTIFS = [
  {
    id:1, unread:true, type:'connect', emoji:'🎸',
    name:'Ode', action:'wants to connect with you',
    time:'2 minutes ago',
    detail_type:'Connection Request',
    detail_title:'Ode wants to connect',
    message:'Ode has 3 songs in common with you — Blinding Lights, Starboy, and Sweater Weather. They think you\'d vibe together!',
    shared:['Blinding Lights','Starboy','Sweater Weather'],
    actions:[{label:'Accept', primary:true},{label:'Decline', primary:false}]
  },
  {
    id:2, unread:true, type:'match', emoji:'🎵',
    name:'Leo', action:'matched your music taste',
    time:'18 minutes ago',
    detail_type:'New Match',
    detail_title:'You matched with Leo!',
    message:'Leo shares 2 songs with you — Starboy and As It Was. Your Tuning Fork compatibility is 68%.',
    shared:['Starboy','As It Was'],
    actions:[{label:'View Profile', primary:true},{label:'Connect', primary:false}]
  },
  {
    id:3, unread:false, type:'song', emoji:'🎶',
    name:'Priya', action:'shared a song with you',
    time:'1 hour ago',
    detail_type:'Song Share',
    detail_title:'Priya shared "Shape of You"',
    message:'Priya thinks you\'ll love Shape of You by Ed Sheeran. It matches your listening patterns and genre preferences.',
    shared:['Shape of You'],
    actions:[{label:'Listen', primary:true},{label:'Thank Priya', primary:false}]
  },
  {
    id:4, unread:false, type:'connect', emoji:'🎹',
    name:'Mara', action:'accepted your connection',
    time:'3 hours ago',
    detail_type:'Connection Accepted',
    detail_title:'Mara accepted your request',
    message:'You are now connected with Mara. You both love Sweater Weather and Shape of You — start a conversation!',
    shared:['Sweater Weather','Shape of You'],
    actions:[{label:'Message Mara', primary:true}]
  },
  {
    id:5, unread:false, type:'match', emoji:'🥁',
    name:'Daily Triad', action:'is ready for today',
    time:'6 hours ago',
    detail_type:'Daily Triad',
    detail_title:'Your Daily Triad is ready!',
    message:'Today\'s Triad matches you with Ode (76% compatible) and Leo (68%). Check out how your music tastes line up.',
    shared:[],
    actions:[{label:'View Triad', primary:true}]
  },
  {
    id:6, unread:false, type:'song', emoji:'🎷',
    name:'Jazzie', action:'your weekly recap is ready',
    time:'Yesterday',
    detail_type:'Weekly Recap',
    detail_title:'Your week in music',
    message:'This week you listened to 47 songs, added 3 to your top picks, and made 2 new connections. The Weeknd and Harry Styles dominated your playlist.',
    shared:[],
    actions:[{label:'View Recap', primary:true}]
  },
  {
    id:7, unread:false, type:'connect', emoji:'🎻',
    name:'Finn', action:'is now following you',
    time:'2 days ago',
    detail_type:'New Follower',
    detail_title:'Finn started following you',
    message:'Finn discovered your profile through the Find Me graph. You don\'t share songs yet — but maybe that\'ll change!',
    shared:[],
    actions:[{label:'Follow Back', primary:true},{label:'View Profile', primary:false}]
  },
];

let activeId = null;
let readIds = new Set([3,4,5,6,7]);

function renderList() {
  const scroll = document.getElementById('notifScroll');
  scroll.innerHTML = '';
  NOTIFS.forEach(n => {
    const isUnread = n.unread && !readIds.has(n.id);
    const div = document.createElement('div');
    div.className = 'notif-item' + (isUnread ? ' unread' : '') + (activeId===n.id ? ' active' : '');
    div.innerHTML = `
      <div class="notif-avatar ${n.type}">${n.emoji}</div>
      <div class="notif-body">
        <div class="notif-text"><strong>${n.name}</strong> <span class="notif-action">${n.action}</span></div>
        <div class="notif-time">${n.time}</div>
      </div>`;
    div.onclick = () => selectNotif(n.id);
    scroll.appendChild(div);
  });
  // Update badge
  const unread = NOTIFS.filter(n => n.unread && !readIds.has(n.id)).length;
  const badge = document.getElementById('notifBadge');
  badge.textContent = unread;
  badge.style.display = unread > 0 ? 'flex' : 'none';
}

function selectNotif(id) {
  activeId = id;
  readIds.add(id);
  renderList();

  const n = NOTIFS.find(x => x.id === id);
  document.getElementById('detailEmpty').style.display = 'none';
  const dc = document.getElementById('detailContent');
  dc.classList.remove('show');
  void dc.offsetWidth; // reflow to retrigger animation
  dc.classList.add('show');

  document.getElementById('detailType').textContent = n.detail_type;
  document.getElementById('detailTitle').textContent = n.detail_title;
  document.getElementById('detailTime').textContent = n.time;

  const body = document.getElementById('detailBody');
  body.innerHTML = `
    <div class="detail-profile">
      <div class="dp-avatar">${n.emoji}</div>
      <div>
        <div class="dp-name">${n.name}</div>
        <div class="dp-sub">${n.type === 'connect' ? 'Connection' : n.type === 'match' ? 'Music Match' : 'Activity'}</div>
      </div>
    </div>
    <div class="detail-message">${n.message}</div>
    ${n.shared.length ? `
      <div class="shared-songs-wrap">
        <div class="shared-songs-title">Shared Songs</div>
        <div class="shared-songs-list">
          ${n.shared.map(s=>`<div class="shared-song"><div class="shared-dot"></div>${s}</div>`).join('')}
        </div>
      </div>
      <br>
    ` : ''}
    <div class="detail-actions">
      ${n.actions.map(a=>`<button class="action-btn ${a.primary?'action-primary':'action-secondary'}" onclick="handleAction('${a.label}',${n.id})">${a.label}</button>`).join('')}
    </div>`;
}

function handleAction(label, id) {
  const btn = event.target;
  btn.textContent = '✓ Done';
  btn.style.opacity = '0.6';
  btn.style.pointerEvents = 'none';
}

function markAllRead() {
  NOTIFS.forEach(n => readIds.add(n.id));
  renderList();
}

renderList();
</script>
</body>
</html>
