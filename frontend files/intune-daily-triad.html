<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InTune — Daily Triad</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0d1117;--nav-bg:#0f1623;--card-bg:#131c2e;--card2:#1a2540;--green-node:#b8d96e;--blue-node:#5fc4b8;--you-color:#c93b6a;--text:#e8eaf0;--muted:#7a8599;--border:rgba(255,255,255,0.07); }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background: var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
  nav{background:var(--nav-bg);border-bottom:1.5px solid #1b3258;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;flex-shrink:0;}
  .nav-left{display:flex;align-items:center;gap:14px;}
  .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
  .nav-logo span{font-family:'Syne',sans-serif;font-weight:700;font-size:20px;font-style:italic;color:#AEC477;}
  .nav-divider{width:1px;height:20px;background:var(--border);}
  .nav-page{font-size:14px;color:var(--muted);}
  .nav-icons{display:flex;gap:10px;}
  .nav-icon{width:38px;height:38px;border-radius:50%;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:background 0.2s;text-decoration:none;}
  .nav-icon:hover{background:rgba(184,217,110,0.1);}
  .nav-icon svg{width:17px;height:17px;fill:none;stroke:var(--muted);stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
  .badge{position:absolute;top:-2px;right:-2px;width:15px;height:15px;border-radius:50%;background:var(--you-color);font-size:8px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;border:1.5px solid var(--nav-bg);}
  .main{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:16px;overflow:hidden;}
  .panel{background:linear-gradient(to bottom,var(--card-bg) 0%,#1a2840 100%);border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,0.45),0 2px 8px rgba(0,0,0,0.3);display:flex;flex-direction:column;overflow:hidden;animation:panelIn 0.4s cubic-bezier(0.22,1,0.36,1) both;}
  .panel:nth-child(2){animation-delay:.07s;}
  .panel:nth-child(3){animation-delay:.14s;}
  @keyframes panelIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .panel-scroll{overflow-y:auto;flex:1;}
  .panel-scroll::-webkit-scrollbar{width:3px;}
  .panel-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px;}
  .panel-top{padding:18px 18px 0;display:flex;align-items:center;gap:12px;flex-shrink:0;}
  .match-avatar{width:48px;height:48px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#c93b6a33,#5fc4b833);border:2px solid rgba(201,59,106,0.3);display:flex;align-items:center;justify-content:center;font-size:22px;}
  .match-info{flex:1;min-width:0;}
  .match-name{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;font-style:italic;}
  .match-sub{font-size:11px;color:var(--muted);margin-top:1px;}
  .match-ring{flex-shrink:0;position:relative;width:54px;height:54px;}
  .match-ring svg{width:54px;height:54px;transform:rotate(-90deg);}
  .ring-bg2{fill:none;stroke:#1e2a3a;stroke-width:5;}
  .ring-arc{fill:none;stroke:var(--you-color);stroke-width:5;stroke-linecap:round;filter:drop-shadow(0 0 6px rgba(201,59,106,0.7));}
  .ring-pct2{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;color:var(--you-color);}
  .shared-pill{margin:10px 14px 0;padding:7px 12px;border-radius:8px;background:rgba(184,217,110,0.08);font-size:11px;color:var(--green-node);line-height:1.5;flex-shrink:0;}
  .shared-pill strong{font-weight:600;}
  .sec-title{font-family:'Syne',sans-serif;font-weight:700;font-size:11px;padding:10px 18px 5px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;}
  .list{padding:0 10px;display:flex;flex-direction:column;gap:1px;}
  .li{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:8px;cursor:pointer;transition:background 0.15s;}
  .li:hover{background:var(--card2);}
  .rank{width:14px;text-align:center;font-size:11px;color:var(--muted);font-weight:600;flex-shrink:0;}
  .thumb{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#1e2d4a,#2a1e3e);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
  .thumb.shared{background:linear-gradient(135deg,#1a2e10,#0e1a08);border:1px solid rgba(184,217,110,0.2);}
  .ii{flex:1;min-width:0;}
  .it{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .is{font-size:10px;color:var(--green-node);font-weight:500;}
  .sep{height:1px;background:var(--border);margin:6px 16px;}
  .panel-footer{padding:10px 14px;flex-shrink:0;}
  .connect-btn{width:100%;padding:10px;border-radius:9px;border:none;background:linear-gradient(135deg,#c93b6a,#a02d54);color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:opacity .18s,transform .15s;box-shadow:0 3px 14px rgba(201,59,106,0.3);}
  .connect-btn:hover{opacity:.88;transform:translateY(-1px);}
  .connect-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
  .connect-btn.connected{background:linear-gradient(135deg,#7a9e2e,#5a7a1a);box-shadow:0 3px 14px rgba(184,217,110,0.2);}
  /* Profile detail sections in triad */
  .pt-album-row{display:flex;align-items:center;gap:10px;padding:10px 14px 0;}
  .pt-album-thumb{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#1e2d4a,#2a1e3e);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .pt-genres{display:flex;flex-wrap:wrap;gap:4px;flex:1;}
  .pt-genre{padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;background:rgba(184,217,110,0.12);color:#b8d96e;}
  .pt-status{display:flex;align-items:center;gap:8px;padding:7px 14px;margin:6px 14px 0;border-radius:8px;background:rgba(255,255,255,0.04);}
  .pt-status-bars{display:flex;align-items:flex-end;gap:1.5px;height:14px;flex-shrink:0;}
  .pt-status-bar{width:2.5px;border-radius:2px;background:var(--you-color);animation:bar2 0.9s ease-in-out infinite alternate;}
  @keyframes bar2{from{transform:scaleY(0.3);opacity:0.5}to{transform:scaleY(1);opacity:1}}
  .pt-status-info{flex:1;min-width:0;}
  .pt-status-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pt-status-caption{font-size:10px;color:var(--muted);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
  .pt-phases{padding:0 14px 6px;display:flex;flex-direction:column;gap:4px;}
  .pt-phase{display:flex;gap:8px;font-size:10px;}
  .pt-phase-year{color:#b8d96e;font-weight:700;font-family:'Syne',sans-serif;width:26px;flex-shrink:0;}
  .pt-phase-label{color:rgba(232,234,240,0.85);}
</style>
</head>
<body>
<nav>
  <div class="nav-left">
    <a href="intune-dashboard.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
      <svg width="26" height="34" viewBox="0 0 39 50" fill="none"><path d="M34.7139 23.8545L33.4558 30.9898C32.9261 33.994 31.0272 36.5839 28.3089 38.0097C24.2637 40.1315 19.2708 39.2512 16.1953 35.8737C14.1286 33.6042 13.23 30.5211 13.7598 27.5168L15.0179 20.3816M21.8056 39.4742L20.8084 45.1296M4.00067 25.2761L5.2586 18.1408C5.78824 15.1366 7.687 12.5467 10.4052 11.1208C14.4504 8.99878 19.4433 9.87902 22.519 13.2564C24.5857 15.5259 25.4844 18.609 24.9547 21.6132L23.6968 28.7485M16.9086 9.65607L17.9056 4.00067" stroke="#AEC477" stroke-width="8" stroke-linecap="round"/></svg>
      <span style="font-family:'Syne',sans-serif;font-weight:700;font-size:20px;font-style:italic;color:#AEC477;letter-spacing:0.01em;">InTune</span>
    </a>
    <div class="nav-divider"></div>
    <span class="nav-page">Daily Triad</span>
  </div>
  <div class="nav-icons">
    <a href="intune-daily-triad.html" class="nav-icon" title="Daily Triad">
      <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    </a>
    <a href="intune-profile.html" class="nav-icon" title="Profile">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    </a>
    <a href="intune-notifications.html" class="nav-icon" title="Messages" style="position:relative">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span class="badge">2</span>
    </a>
    <a href="#" class="nav-icon" title="Settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </a>
  </div>
</nav>
<div class="main" id="main"></div>
<script>
const C=2*Math.PI*22;
const MATCHES=[
  {name:'Ode',emoji:'🎸',pct:76,album:'After Hours',albumEmoji:'🌙',genres:['R&B','HIP-HOP'],statusSong:'Starboy',statusArtist:'The Weeknd',statusCaption:'no context just vibes',phases:[{year:'2020',label:'quarantine R&B 🎙️'},{year:'now',label:'trap soul era 🌑'}],songs:[{t:'Sweater Weather',em:'❄️',sh:true},{t:'As It Was',em:'🌀',sh:true},{t:'Blinding Lights',em:'⚡',sh:true},{t:'Shape of You',em:'✂️',sh:false},{t:'Starboy',em:'⭐',sh:false}],artists:[{t:'The Weeknd',em:'🌙'},{t:'Harry Styles',em:'🌿'},{t:'Ed Sheeran',em:'🔥'}]},
  {name:'Leo',emoji:'🎹',pct:58,album:"Harry's House",albumEmoji:'🏠',genres:['POP','DANCE'],statusSong:'As It Was',statusArtist:'Harry Styles',statusCaption:'summer on repeat ☀️',phases:[{year:'2022',label:'hyperpop summer ⚡'},{year:'now',label:'sunshine pop 🌻'}],songs:[{t:'Starboy',em:'⭐',sh:true},{t:'As It Was',em:'🌀',sh:true},{t:'Levitating',em:'🪐',sh:false},{t:'Peaches',em:'🍑',sh:false},{t:'Stay',em:'💙',sh:false}],artists:[{t:'The Weeknd',em:'🌙'},{t:'Dua Lipa',em:'💃'},{t:'Justin Bieber',em:'🎤'}]},
  {name:'Mara',emoji:'🎷',pct:44,album:'Midnights',albumEmoji:'🌌',genres:['POP','FOLK'],statusSong:'Anti-Hero',statusArtist:'Taylor Swift',statusCaption:"it's me, hi 👋",phases:[{year:'2018',label:'swiftie forever 🩷'},{year:'now',label:'midnight mode 🌙'}],songs:[{t:'Shape of You',em:'✂️',sh:true},{t:'Sweater Weather',em:'❄️',sh:true},{t:'Drivers License',em:'🚗',sh:false},{t:'good 4 u',em:'🌸',sh:false},{t:'Happier',em:'😊',sh:false}],artists:[{t:'Olivia Rodrigo',em:'🌸'},{t:'Ed Sheeran',em:'🔥'},{t:'Taylor Swift',em:'💫'}]},
];
function panel(m,i){
  const sh=m.songs.filter(s=>s.sh);
  return `<div class="panel">
    <div class="panel-top">
      <div class="match-avatar">${m.emoji}</div>
      <div class="match-info"><div class="match-name">${m.name}</div><div class="match-sub">${sh.length} shared song${sh.length!==1?'s':''}</div></div>
      <div class="match-ring">
        <svg viewBox="0 0 54 54"><circle class="ring-bg2" cx="27" cy="27" r="22"/><circle class="ring-arc" cx="27" cy="27" r="22" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${C.toFixed(1)}" id="arc${i}" data-to="${(C*(1-m.pct/100)).toFixed(1)}"/></svg>
        <div class="ring-pct2">${m.pct}%</div>
      </div>
    </div>
    <div class="shared-pill"><strong>${m.pct}% compatible</strong> · ${sh.map(s=>s.t).join(', ')||'No shared songs yet'}</div>
    <!-- Album + genres row -->
    <div class="pt-album-row">
      <div class="pt-album-thumb">${m.albumEmoji||'🎵'}</div>
      <div class="pt-genres">${(m.genres||[]).map(g=>`<span class="pt-genre">${g}</span>`).join('')}</div>
    </div>
    <!-- Status song -->
    ${m.statusSong?`<div class="pt-status">
      <div class="pt-status-bars">${[10,16,7].map((h,idx)=>`<div class="pt-status-bar" style="height:${h}px;animation-delay:${idx*0.15}s"></div>`).join('')}</div>
      <div class="pt-status-info">
        <div class="pt-status-name">${m.statusSong} — ${m.statusArtist||''}</div>
        <div class="pt-status-caption">${m.statusCaption||''}</div>
      </div>
    </div>`:''}
    <div class="panel-scroll">
      <div class="sec-title">Top Songs</div>
      <div class="list">${m.songs.map((s,j)=>`<div class="li"><span class="rank">${j+1}</span><div class="thumb${s.sh?' shared':''}">${s.em}</div><div class="ii"><div class="it">${s.t}</div>${s.sh?'<div class="is">✓ shared</div>':''}</div></div>`).join('')}</div>
      <div class="sep"></div>
      <div class="sec-title">Top Artists</div>
      <div class="list">${m.artists.map((a,j)=>`<div class="li"><span class="rank">${j+1}</span><div class="thumb">${a.em}</div><div class="ii"><div class="it">${a.t}</div></div></div>`).join('')}</div>
    </div>
    <div class="panel-footer">
      <button class="connect-btn" id="cb${i}" onclick="conn(${i})">
        <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        Connect with ${m.name}
      </button>
    </div>
  </div>`;
}
document.getElementById('main').innerHTML=MATCHES.map((m,i)=>panel(m,i)).join('');
setTimeout(()=>{MATCHES.forEach((_,i)=>{const a=document.getElementById('arc'+i);if(a){a.style.transition=`stroke-dashoffset ${0.9+i*.1}s cubic-bezier(0.22,1,0.36,1) ${0.3+i*.1}s`;a.style.strokeDashoffset=a.dataset.to;}});},50);
const conn_set=new Set();
function conn(i){const b=document.getElementById('cb'+i);if(conn_set.has(i))return;conn_set.add(i);b.classList.add('connected');b.innerHTML=`<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg> Connected!`;b.style.pointerEvents='none';}
</script>
</body>
</html>
